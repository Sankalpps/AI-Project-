<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mysore Live Bus Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background: #f4f7f6; overflow: hidden; }

        /* Sidebar Styling */
        .sidebar {
            width: 320px;
            background: #ffffff;
            padding: 20px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .header { margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; background: #bbb; margin-right: 5px; }
        .online { background: #28a745; box-shadow: 0 0 5px #28a745; }

        .bus-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 6px solid #ccc;
            transition: transform 0.2s;
        }
        .bus-card:hover { transform: scale(1.02); }
        .bus-card .bus-id { font-weight: bold; font-size: 1rem; color: #222; }
        .bus-card .bus-route { font-size: 0.85rem; color: #666; margin: 2px 0 8px; }
        .bus-card .detail-row { display: flex; justify-content: space-between; font-size: 0.82rem; color: #444; margin-top: 4px; }
        .bus-card .detail-label { color: #999; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            background: #e8f5e9;
            color: #28a745;
        }
        .locate-btn {
            margin-top: 10px;
            width: 100%;
            min-height: 40px;
            padding: 8px 10px;
            border: none;
            border-radius: 6px;
            background: #f0f4ff;
            color: #3a6df0;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .locate-btn:hover { background: #dce6ff; }

        /* Map Styling */
        #map { flex-grow: 1; height: 100%; }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: 100dvh;
                overflow: auto;
            }

            .sidebar {
                width: 100%;
                max-height: 42dvh;
                padding: 14px;
                box-shadow: none;
                border-bottom: 1px solid #e8e8e8;
            }

            .header h2 {
                font-size: 1.1rem;
            }

            .bus-card {
                padding: 12px;
            }

            #map {
                width: 100%;
                height: 58dvh;
                min-height: 320px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <h2>Mysore Transit</h2>
            <p><span id="dot" class="status-dot"></span> <span id="conn-text">Connecting to Server...</span></p>
        </div>
        <div id="bus-list"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        // 1. Initialize Map centered on Mysore
        const map = L.map('map').setView([12.371214742514967, 76.58488491499308], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let markers = {};

        // 2. Connect to server.js backend
        const backendUrl = location.protocol === 'file:'
            ? 'http://localhost:3000'
            : `${location.protocol}//${location.hostname}:3000`;
        const socket = io(backendUrl, {
            reconnection: true,
            reconnectionAttempts: 20,
            reconnectionDelay: 1000
        });

        socket.on('connect', () => {
            document.getElementById('dot').classList.add('online');
            document.getElementById('conn-text').innerText = 'System Online';
        });

        socket.on('disconnect', () => {
            document.getElementById('dot').classList.remove('online');
            document.getElementById('conn-text').innerText = 'System Offline';
        });

        socket.on('connect_error', () => {
            document.getElementById('dot').classList.remove('online');
            document.getElementById('conn-text').innerText = 'Cannot reach backend on port 3000';
        });

        // Helper: build a bus card from server data
        function createCard(bus) {
            const card = document.createElement('div');
            card.className = 'bus-card';
            card.id = `card-${bus.id}`;
            card.style.borderLeftColor = bus.color;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="bus-id">${bus.id}</span>
                    <span class="badge">● Active</span>
                </div>
                <div class="bus-route">📍 ${bus.route}</div>
                <div class="detail-row">
                    <span><span class="detail-label">Speed</span> <b class="speed-label">${bus.speed}</b> km/h</span>
                </div>
                <div class="detail-row">
                    <span><span class="detail-label">Lat</span> <span class="lat-label">${bus.lat.toFixed(4)}</span></span>
                    <span><span class="detail-label">Lng</span> <span class="lng-label">${bus.lng.toFixed(4)}</span></span>
                </div>
                <button class="locate-btn" onclick="locateBus('${bus.id}')">🎯 Locate on Map</button>
            `;
            return card;
        }

        // 3. Receive initial fleet from server.js → init-fleet event
        socket.on('init-fleet', (fleet) => {
            const listDiv = document.getElementById('bus-list');
            listDiv.innerHTML = '';

            fleet.forEach(bus => {
                markers[bus.id] = L.circleMarker([bus.lat, bus.lng], {
                    radius: 10,
                    fillColor: bus.color,
                    color: '#fff',
                    weight: 2,
                    fillOpacity: 0.9
                }).addTo(map).bindPopup(`<b>${bus.id}</b><br>Route: ${bus.route}`);

                listDiv.appendChild(createCard(bus));
            });
        });

        // 4. Receive live updates from server.js → fleet-update event (every 2s)
        socket.on('fleet-update', (updatedFleet) => {
            updatedFleet.forEach(bus => {
                if (markers[bus.id]) markers[bus.id].setLatLng([bus.lat, bus.lng]);

                const card = document.getElementById(`card-${bus.id}`);
                if (card) {
                    card.querySelector('.speed-label').innerText = bus.speed;
                    card.querySelector('.lat-label').innerText = bus.lat.toFixed(4);
                    card.querySelector('.lng-label').innerText = bus.lng.toFixed(4);
                }
            });
        });

        // Locate a bus on the map
        function locateBus(id) {
            if (markers[id]) {
                map.panTo(markers[id].getLatLng());
                markers[id].openPopup();
            }
        }

        window.addEventListener('resize', () => map.invalidateSize());
    </script>
</body>
</html>
