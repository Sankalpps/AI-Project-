<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mysore Live Bus Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background: #f4f7f6; overflow: hidden; }

        /* Sidebar Styling */
        .sidebar {
            width: 320px;
            background: #ffffff;
            padding: 20px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .header { margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; background: #bbb; margin-right: 5px; }
        .online { background: #28a745; box-shadow: 0 0 5px #28a745; }

        .bus-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 6px solid #ccc;
            transition: transform 0.2s;
        }
        .bus-card:hover { transform: scale(1.02); }
        .bus-card .bus-id { font-weight: bold; font-size: 1rem; color: #222; }
        .bus-card .bus-route { font-size: 0.85rem; color: #666; margin: 2px 0 8px; }
        .bus-card .detail-row { display: flex; justify-content: space-between; font-size: 0.82rem; color: #444; margin-top: 4px; }
        .bus-card .detail-label { color: #999; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            background: #e8f5e9;
            color: #28a745;
        }
        .locate-btn {
            margin-top: 10px;
            width: 100%;
            min-height: 40px;
            padding: 8px 10px;
            border: none;
            border-radius: 6px;
            background: #f0f4ff;
            color: #3a6df0;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .locate-btn:hover { background: #dce6ff; }

        /* Map Styling */
        #map { flex-grow: 1; height: 100%; }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: 100dvh;
                overflow: auto;
            }

            .sidebar {
                width: 100%;
                max-height: 42dvh;
                padding: 14px;
                box-shadow: none;
                border-bottom: 1px solid #e8e8e8;
            }

            .header h2 {
                font-size: 1.1rem;
            }

            .bus-card {
                padding: 12px;
            }

            #map {
                width: 100%;
                height: 58dvh;
                min-height: 320px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <h2>Mysore Transit</h2>
            <p><span id="dot" class="status-dot"></span> <span id="conn-text">Connecting to Server...</span></p>
            <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee;">
                <small id="user-info" style="color: #999;"></small>
                <button id="logout-btn" style="width: 100%; margin-top: 8px; padding: 6px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem;">Logout</button>
            </div>
        </div>
        <div id="bus-list"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // ========== AUTHENTICATION CHECK ==========
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        const assignedBusId = localStorage.getItem('busId');

        if (!token || !username || !assignedBusId) {
            window.location.href = '/login.html';
        }

        // Display user info
        document.getElementById('user-info').textContent = `👤 ${username} | Bus: ${assignedBusId}`;

        // Logout handler
        document.getElementById('logout-btn').addEventListener('click', async () => {
            try {
                await fetch('/auth/logout', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
            } catch (e) {
                console.log('Logout error (non-blocking):', e);
            }
            
            localStorage.clear();
            window.location.href = '/login.html';
        });

        // 1. Initialize Map centered on Mysore
        const map = L.map('map').setView([12.371214742514967, 76.58488491499308], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let markers = {};

        // 2. Fleet data (runs entirely client-side — no backend needed)
        let buses = [
            { id: 'BUS-101', route: 'KRS Dam', lat: 12.3051, lng: 76.6550, speed: 40, color: '#ff0000' },
            { id: 'BUS-102', route: 'NIE NORTH', lat: 12.371214742514967, lng: 76.58488491499308, speed: 35, color: '#28a745' },
            { id: 'BUS-103', route: 'Infosys Campus', lat: 12.3550, lng: 76.6000, speed: 45, color: '#00d5ff' },
            { id: 'BUS-104', route: 'NIE SOUTH', lat: 12.28393, lng: 76.64143, speed: 45, color: '#007bff' },
            { id: 'BUS-105', route: 'Aravind Hospital', lat: 12.3045, lng: 76.6547, speed: 38, color: '#ffc107' },
            { id: 'BUS-106', route: 'Palace Road', lat: 12.2847, lng: 76.6446, speed: 42, color: '#e91e63' },
            { id: 'BUS-107', route: 'Gokulam', lat: 12.3388, lng: 76.6944, speed: 40, color: '#009688' },
            { id: 'BUS-108', route: 'Railway Station', lat: 12.2942, lng: 76.5990, speed: 35, color: '#673ab7' },
            { id: 'BUS-109', route: 'Bus Stand', lat: 12.3070, lng: 76.6468, speed: 43, color: '#ff9800' },
            { id: 'BUS-110', route: 'Jayadeva Hospital', lat: 12.3222, lng: 76.6356, speed: 39, color: '#4caf50' }
        ];

        // Filter buses to show only the user's assigned bus
        buses = buses.filter(bus => bus.id === assignedBusId);

        // Mark system as online immediately
        document.getElementById('dot').classList.add('online');
        document.getElementById('conn-text').innerText = 'System Online';

        // Helper: build a bus card
        function createCard(bus) {
            const card = document.createElement('div');
            card.className = 'bus-card';
            card.id = `card-${bus.id}`;
            card.style.borderLeftColor = bus.color;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="bus-id">${bus.id}</span>
                    <span class="badge">● Active</span>
                </div>
                <div class="bus-route">📍 ${bus.route}</div>
                <div class="detail-row">
                    <span><span class="detail-label">Speed</span> <b class="speed-label">${bus.speed}</b> km/h</span>
                </div>
                <div class="detail-row">
                    <span><span class="detail-label">Lat</span> <span class="lat-label">${bus.lat.toFixed(4)}</span></span>
                    <span><span class="detail-label">Lng</span> <span class="lng-label">${bus.lng.toFixed(4)}</span></span>
                </div>
                <button class="locate-btn" onclick="locateBus('${bus.id}')">🎯 Locate on Map</button>
            `;
            return card;
        }

        // 3. Initialize fleet on the map and sidebar
        function initFleet() {
            const listDiv = document.getElementById('bus-list');
            listDiv.innerHTML = '';

            buses.forEach(bus => {
                markers[bus.id] = L.circleMarker([bus.lat, bus.lng], {
                    radius: 10,
                    fillColor: bus.color,
                    color: '#fff',
                    weight: 2,
                    fillOpacity: 0.9
                }).addTo(map).bindPopup(`<b>${bus.id}</b><br>Route: ${bus.route}`);

                listDiv.appendChild(createCard(bus));
            });
        }

        // 4. Simulate movement every 2 seconds (same logic as the old server.js)
        function simulateMovement() {
            buses.forEach(bus => {
                bus.lat += (Math.random() - 0.5) * 0.0015;
                bus.lng += (Math.random() - 0.5) * 0.0015;
                bus.speed = Math.floor(Math.random() * 25) + 20;

                if (markers[bus.id]) markers[bus.id].setLatLng([bus.lat, bus.lng]);

                const card = document.getElementById(`card-${bus.id}`);
                if (card) {
                    card.querySelector('.speed-label').innerText = bus.speed;
                    card.querySelector('.lat-label').innerText = bus.lat.toFixed(4);
                    card.querySelector('.lng-label').innerText = bus.lng.toFixed(4);
                }
            });
        }

        // Start the simulation
        initFleet();
        setInterval(simulateMovement, 2000);

        // Locate a bus on the map
        function locateBus(id) {
            if (markers[id]) {
                map.panTo(markers[id].getLatLng());
                markers[id].openPopup();
            }
        }

        window.addEventListener('resize', () => map.invalidateSize());
    </script>
</body>
</html>
